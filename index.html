<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karak Express</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --yellow: #F5B731;
  --red: #E84040;
  --green: #25D366;
  --dark: #1a2744;
  --white: #ffffff;
  --home-bg: url("media/gemini-karak-bg-home.png");
  --home-bg-desktop: url("media/gemini-karak-bg-home-desktop.png");
}

html, body {
  min-height: 100%;
  font-family: 'Poppins', sans-serif;
  background:
    linear-gradient(135deg, rgba(245, 183, 49, 0.45), rgba(245, 183, 49, 0.30)),
    var(--home-bg) center/cover no-repeat fixed;
  overflow-x: hidden;
}

.page {
  min-height: 100vh;
  background: transparent;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-bottom: 80px;
}

.page::before {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    linear-gradient(135deg, rgba(245, 183, 49, 0.45), rgba(245, 183, 49, 0.30)),
    var(--home-bg) center/cover no-repeat;
  background-attachment: fixed;
  filter: saturate(1.05) contrast(1.03);
  pointer-events: none;
}

.page::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  background:
    radial-gradient(circle at top, rgba(255,255,255,0.18), transparent 24%),
    linear-gradient(180deg, rgba(26,39,68,0.02), rgba(26,39,68,0.06));
  pointer-events: none;
}

/* ---- Food decorations ---- */
.food-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  overflow: hidden;
  z-index: 1;
}

.food-bg img {
  position: absolute;
  display: block;
  opacity: 0.95;
  filter: drop-shadow(0 8px 18px rgba(0,0,0,0.18));
}

.food-tl {
  position: absolute;
  top: 0; left: -20px;
  width: clamp(120px, 22vw, 260px);
}
.food-tr {
  position: absolute;
  top: 0; right: -10px;
  width: clamp(110px, 20vw, 240px);
}
.food-bl {
  position: absolute;
  bottom: 60px; left: -10px;
  width: clamp(110px, 18vw, 220px);
}
.food-br {
  position: absolute;
  bottom: 50px; right: -8px;
  width: clamp(110px, 18vw, 220px);
}

/* ---- Content ---- */
.content {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 480px;
  padding: clamp(32px, 8vw, 60px) clamp(24px, 6vw, 48px) clamp(24px, 6vw, 40px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(16px, 3vw, 24px);
}

/* ---- Logo ---- */
.logo-wrap {
  display: flex;
  justify-content: center;
}
.logo-wrap img {
  width: clamp(110px, 26vw, 160px);
  height: auto;
  border-radius: 18px;
  display: block;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.22));
}

/* ---- Tagline ---- */
.tagline {
  text-align: center;
  position: relative;
}
.tagline-inner {
  display: inline-block;
  position: relative;
}
.spark {
  position: absolute;
  left: -22px;
  top: 6px;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.spark span {
  display: block;
  height: 3px;
  border-radius: 2px;
  background: var(--red);
}
.spark span:first-child { width: 8px; transform: rotate(-20deg); }
.spark span:last-child { width: 13px; }

.tagline h1 {
  font-size: clamp(22px, 5.5vw, 34px);
  font-weight: 900;
  color: var(--dark);
  line-height: 1.2;
  letter-spacing: -0.3px;
}
.tagline-line {
  display: block;
  width: 120px;
  height: 18px;
  margin: 8px auto 0;
}

/* ---- Buttons ---- */
.btn-list {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: clamp(10px, 2vw, 14px);
}

.btn {
  width: 100%;
  height: clamp(52px, 9vw, 64px);
  border-radius: 50px;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  padding: 0 clamp(14px, 3vw, 22px) 0 clamp(6px, 1.5vw, 10px);
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: clamp(14px, 3vw, 17px);
  text-decoration: none;
  color: inherit;
  transition: transform 0.14s, box-shadow 0.14s;
  box-shadow: 0 4px 14px rgba(0,0,0,0.11);
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(0,0,0,0.17); }
.btn:active { transform: scale(0.97); }

.btn-icon {
  width: clamp(38px, 7vw, 48px);
  height: clamp(38px, 7vw, 48px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-right: clamp(12px, 2.5vw, 18px);
  flex-shrink: 0;
}
.btn-label { flex: 1; text-align: left; }
.btn-arrow { font-size: clamp(16px, 3vw, 20px); font-weight: 700; }

/* Red */
.btn-menu { background: var(--red); color: #fff; }
.btn-menu .btn-icon { background: rgba(255,255,255,0.22); }

/* Green */
.btn-whatsapp { background: var(--green); color: #fff; }
.btn-whatsapp .btn-icon { background: rgba(255,255,255,0.22); }

/* White */
.btn-white { background: rgba(255,255,255,0.92); color: var(--dark); }
.btn-white .btn-icon { background: rgba(26,39,68,0.1); }
.btn-white .btn-arrow { color: var(--dark); }

/* ---- Social ---- */
.social-row {
  display: flex;
  gap: clamp(8px, 2vw, 14px);
  align-items: center;
  justify-content: center;
  flex-wrap: wrap;
}
.soc {
  width: clamp(46px, 9vw, 58px);
  height: clamp(46px, 9vw, 58px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.16s ease, box-shadow 0.16s ease;
  border: 1px solid rgba(255,255,255,0.95);
  outline: none;
  background: rgba(255,255,255,0.96);
  color: var(--dark);
  box-shadow: 0 8px 18px rgba(26,39,68,0.12);
}
.soc svg {
  width: 30px;
  height: 30px;
  display: block;
  fill: currentColor;
}
.soc:hover {
  transform: translateY(-1px) scale(1.05);
  box-shadow: 0 10px 22px rgba(26,39,68,0.16);
}
.soc:active { transform: scale(0.96); }
.soc-ig, .soc-tt, .soc-fb { color: var(--red); background: rgba(255,255,255,0.96); }
.soc-x  { background: #000; }
.soc-yt { background: #FF0000; }

.copyright {
  font-size: clamp(9px, 2vw, 12px);
  color: rgba(26,39,68,0.45);
  text-align: center;
  padding-bottom: 8px;
}

/* ---- Tablet / Desktop ---- */
@media (min-width: 768px) {
  html, body {
    background:
      linear-gradient(135deg, rgba(245, 183, 49, 0.42), rgba(245, 183, 49, 0.26)),
      var(--home-bg-desktop) center/100% auto no-repeat fixed;
  }

  .page::before {
    background:
      linear-gradient(135deg, rgba(245, 183, 49, 0.42), rgba(245, 183, 49, 0.26)),
      var(--home-bg-desktop) center/100% auto no-repeat;
    background-attachment: fixed;
  }

  .content {
    max-width: 560px;
    gap: 28px;
  }
  .food-tl, .food-tr { width: clamp(200px, 18vw, 280px); }
  .food-bl, .food-br { width: clamp(180px, 16vw, 260px); }
  .food-bg img { opacity: 0.98; }
}

@media (min-width: 1024px) {
  .content {
    max-width: 620px;
    padding: 70px 60px 50px;
    gap: 32px;
  }
  .food-tl, .food-tr { width: clamp(220px, 15vw, 320px); }
  .food-bl, .food-br { width: clamp(200px, 14vw, 300px); }
}

/* ---- Bottom Navigation ---- */
.bottom-nav-wrapper {
  position: fixed;
  bottom: clamp(16px, 4vw, 24px);
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  min-width: 280px;
  width: clamp(280px, 70vw, 380px);
}
.bottom-nav {
  background: var(--white);
  display: flex;
  justify-content: space-evenly;
  align-items: center;
  width: 100%;
  padding: 8px 16px;
  border-radius: 50px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
  gap: 4px;
}
.nav-item {
  display: flex;
  justify-content: center;
  align-items: center;
  width: 52px;
  height: 46px;
  border-radius: 50px;
  text-decoration: none;
  color: rgba(26,39,68,0.5);
  transition: all 0.3s ease;
}
.nav-item svg {
  width: 26px;
  height: 26px;
  transition: transform 0.2s;
}
.nav-item:hover {
  color: var(--dark);
}
.nav-item.active {
  background: var(--red);
  color: var(--white);
}
.nav-item:hover svg {
  transform: translateY(-2px);
}
.nav-item.active svg {
  transform: translateY(0);
}
.nav-item:active {
  transform: scale(0.92);
}
</style>
</head>
